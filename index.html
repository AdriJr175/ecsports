
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>EC SPORTS</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #00e676;
    }
    .partido {
      border-bottom: 1px solid #444;
      padding: 10px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .btn {
      background: #00e676;
      color: #000;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: 5px;
    }
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
      flex-direction: column;
    }
    #player {
      width: 90%;
      max-width: 800px;
      height: 45vw;
      max-height: 450px;
      background: #000;
    }
    .controls {
      margin-top: 10px;
    }
    .controls button {
      margin: 0 5px;
      padding: 8px 12px;
    }
  </style>
</head>
<body>
  <h1>EC SPORTS</h1>
  <div id="lista">
    <div class="partido">
      <span>[14:00] Real Madrid vs Barça</span>
      <button class="btn" onclick="verPartido('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">VER</button>
    </div>
    <div class="partido">
      <span>[16:30] Juventus vs Milan</span>
      <button class="btn" onclick="verPartido('https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8')">VER</button>
    </div>
    <div class="partido">
      <span>[19:00] Boca vs River</span>
      <button class="btn" onclick="verPartido('https://mojenajlepszetv2.com/live.m3u8')">VER</button>
    </div>
  </div>
  <div id="overlay">
    <video id="video" controls autoplay></video>
    <div class="controls">
      <button class="btn" onclick="cerrar()">Cerrar</button>
      <button class="btn" onclick="pantallaCompleta()">Pantalla completa</button>
    </div>
  </div>
  <script>
    function verPartido(url) {
      const overlay = document.getElementById('overlay');
      const video = document.getElementById('video');
      overlay.style.display = 'flex';
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
      }
    }
    function cerrar() {
      const overlay = document.getElementById('overlay');
      const video = document.getElementById('video');
      video.pause();
      video.src = '';
      overlay.style.display = 'none';
    }
    function pantallaCompleta() {
      const video = document.getElementById('video');
      if (video.requestFullscreen) video.requestFullscreen();
      else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
      else if (video.msRequestFullscreen) video.msRequestFullscreen();
    }
  </script>
</body>
</html>
